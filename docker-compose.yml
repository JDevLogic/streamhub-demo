services:

  redis:
    image: redis:7-alpine
    container_name: streamhub_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - streamhub_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamhub_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - PORT=5050
      - REDIS_URL=redis://redis:6379/0
      - DB_DIR=/app/db_data
      - TZ=Europe/Madrid
    volumes:
      # Persist SQLite database and local cache between restarts
      - backend_data:/app/db_data
      - backend_cache:/app/.cache
    expose:
      - "5050"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.00'
    networks:
      - streamhub_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: streamhub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
    networks:
      - streamhub_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  certbot:
    image: certbot/certbot
    restart: "no"
    command: certbot renew --webroot -w /var/www/certbot --quiet
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  redis_data:
  backend_data:
  backend_cache:

networks:
  streamhub_net:
    driver: bridge
