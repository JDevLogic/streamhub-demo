services:

  redis:
    image: redis:7-alpine
    container_name: anime_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - anime_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anime_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - PORT=5050
      - REDIS_URL=redis://redis:6379/0
      - DB_DIR=/app/db_data
      - TZ=Europe/Madrid
    volumes:
      # Persist SQLite DB and AniList disk cache between restarts
      - backend_data:/app/db_data
      - backend_cache:/app/.cache
    expose:
      - "5050"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - anime_net

  nginx:
    image: nginx:1.27-alpine
    container_name: anime_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - anime_net
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  redis_data:
  backend_data:
  backend_cache:

networks:
  anime_net:
    driver: bridge
